name: Simple TCP Tunnel

on:
  workflow_dispatch:

jobs:
  tunnel:
    runs-on: ubuntu-latest
    steps:
      - name: Get IP
        id: ip
        run: |
          IP=$(curl -s https://api.ipify.org)
          echo "public_ip=$IP" >> $GITHUB_OUTPUT

      - name: Start TCP relay
        run: |
          while true; do nc -l -p 1080 -c 'nc google.com 80'; done &
          echo "Relay started"

      - name: Show config
        run: |
          echo "آدرس: ${{ steps.ip.outputs.public_ip }}:1080"

      - name: Keep alive
        run: sleep 6h
