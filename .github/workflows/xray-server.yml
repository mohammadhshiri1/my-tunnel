name: FRP Tunnel

on:
  workflow_dispatch:

jobs:
  tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get public IP
        id: ip
        run: |
          IP=$(curl -s https://api.ipify.org)
          echo "public_ip=$IP" >> $GITHUB_OUTPUT
          echo "✅ IP: $IP"

      - name: Download FRP
        run: |
          wget https://github.com/fatedier/frp/releases/download/v0.58.0/frp_0.58.0_linux_amd64.tar.gz
          tar -xzf frp_0.58.0_linux_amd64.tar.gz
          sudo mv frp_0.58.0_linux_amd64/frps /usr/local/bin/
          sudo mv frp_0.58.0_linux_amd64/frpc /usr/local/bin/
          rm -rf frp_0.58.0_linux_amd64*

      - name: Start FRP server
        run: |
          nohup sudo /usr/local/bin/frps -c ./frps.ini &
          sleep 3

      - name: Start FRP client
        run: |
          nohup sudo /usr/local/bin/frpc -c ./frpc.ini &
          sleep 3

      - name: Show connection info
        run: |
          echo "====================================="
          echo "✅ تونل با موفقیت برقرار شد"
          echo "آدرس سرور: ${{ steps.ip.outputs.public_ip }}"
          echo "پورت SOCKS5: 1080"
          echo "====================================="
          echo "SOCKS5://${{ steps.ip.outputs.public_ip }}:1080" > config.txt

      - name: Upload config
        uses: actions/upload-artifact@v4
        with:
          name: frp-config
          path: config.txt

      - name: Keep runner alive
        run: sleep 6h
