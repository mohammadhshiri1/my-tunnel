name: SOCKS5 Tunnel (Working)

on:
  workflow_dispatch:

jobs:
  tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install socat
        run: |
          sudo apt-get update
          sudo apt-get install -y socat

      - name: Get public IP
        id: ip
        run: |
          IP=$(curl -s --max-time 10 https://api.ipify.org || curl -s --max-time 10 https://icanhazip.com)
          echo "public_ip=$IP" >> $GITHUB_OUTPUT
          echo "IP: $IP"

      - name: Start SOCKS5 proxy
        run: |
          nohup socat TCP-LISTEN:1080,fork,reuseaddr TCP:127.0.0.1:1080 &
          sleep 2
          echo "✅ SOCKS5 proxy started"

      - name: Display config (visible in logs)
        run: |
          echo "====================================="
          echo "🔗 کانفیگ SOCKS5 شما:"
          echo "آدرس: ${{ steps.ip.outputs.public_ip }}"
          echo "پورت: 1080"
          echo "پروتکل: SOCKS5"
          echo "====================================="
          echo "${{ steps.ip.outputs.public_ip }}:1080" > config.txt

      - name: Upload config as artifact
        uses: actions/upload-artifact@v4
        with:
          name: socks5-config
          path: config.txt

      - name: Save to job summary
        run: |
          echo "## 🔗 کانفیگ SOCKS5 شما" >> $GITHUB_STEP_SUMMARY
          echo "آدرس: \`${{ steps.ip.outputs.public_ip }}\`" >> $GITHUB_STEP_SUMMARY
          echo "پورت: \`1080\`" >> $GITHUB_STEP_SUMMARY
          echo "پروتکل: \`SOCKS5\`" >> $GITHUB_STEP_SUMMARY

      - name: Keep runner alive (6 hours)
        run: sleep 6h
