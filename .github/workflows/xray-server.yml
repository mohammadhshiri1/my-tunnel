- name: Install Xray via GitHub Mirror (gh-proxy)
  id: install_xray
  run: |
    echo "🔄 Downloading Xray using GitHub Mirror (g.hk.uy)..."
    
    # دریافت آخرین نسخه Xray از طریق آینه
    LATEST_VERSION=$(curl -s https://g.hk.uy/https://api.github.com/repos/XTLS/Xray-core/releases/latest | grep -oP '"tag_name": "\K(.*?)(?=")')
    echo "✅ Latest Xray version: $LATEST_VERSION"
    
    # ساخت آدرس دانلود از طریق آینه
    DOWNLOAD_URL="https://g.hk.uy/https://github.com/XTLS/Xray-core/releases/download/${LATEST_VERSION}/Xray-linux-64.zip"
    echo "📥 Downloading from: $DOWNLOAD_URL"
    
    # دانلود فایل از طریق آینه
    curl -L --max-time 60 -o xray.zip "$DOWNLOAD_URL"
    
    # بررسی موفقیت دانلود
    if [ ! -s xray.zip ]; then
      echo "❌ Error: Failed to download Xray binary from mirror."
      exit 1
    fi
    
    echo "✅ Download successful! File size: $(du -h xray.zip | cut -f1)"
    
    # استخراج و نصب
    unzip -o xray.zip -d xray_temp
    sudo mv xray_temp/xray /usr/local/bin/
    sudo chmod +x /usr/local/bin/xray
    rm -rf xray_temp xray.zip
    
    echo "🎉 Xray installed successfully!"
