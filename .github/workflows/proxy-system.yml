name: Proxy Auto-Builder

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run builder script
        env:
          UUID: ${{ secrets.UUID }}
        run: python builder.py

      - name: Commit and push generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add index.html subscription.txt vless.txt vmess.txt trojan.txt public/ configs/
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update configs and panel"
          git push

      - name: Write links to job summary
        run: |
          REPO="${{ github.repository }}"
          OWNER="${{ github.repository_owner }}"
          echo "## ✅ کانفیگ‌ها با موفقیت ساخته و در مخزن ذخیره شدند" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 لینک‌های مستقیم (قابل استفاده در کلاینت)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| نوع | لینک |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| سابسکریپشن ترکیبی | \`https://raw.githubusercontent.com/${REPO}/main/subscription.txt\` |" >> $GITHUB_STEP_SUMMARY
          echo "| VLESS | \`https://raw.githubusercontent.com/${REPO}/main/vless.txt\` |" >> $GITHUB_STEP_SUMMARY
          echo "| VMESS | \`https://raw.githubusercontent.com/${REPO}/main/vmess.txt\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Trojan | \`https://raw.githubusercontent.com/${REPO}/main/trojan.txt\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📁 پنل وب (نمایش اطلاعات)" >> $GITHUB_STEP_SUMMARY
          echo "برای مشاهده پنل، فایل \`index.html\` را از مخزن دانلود کرده و در مرورگر باز کنید." >> $GITHUB_STEP_SUMMARY
          echo "لینک مستقیم: \`https://raw.githubusercontent.com/${REPO}/main/index.html\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "💡 **نحوه استفاده در کلاینت:**" >> $GITHUB_STEP_SUMMARY
          echo "1. در کلاینت خود (V2rayNG, Nekobox, Clash) گزینه **Add Subscription** را بزنید." >> $GITHUB_STEP_SUMMARY
          echo "2. لینک **سابسکریپشن ترکیبی** بالا را در کادر وارد کنید." >> $GITHUB_STEP_SUMMARY
          echo "3. ذخیره کنید و اتصال را فعال کنید." >> $GITHUB_STEP_SUMMARY
